---
# OHE Operator — watches OHECluster CRDs and reconciles Deployments.
# Apply after: crd/oheclusters.yaml and rbac.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ruptura-operator
  namespace: ruptura-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ruptura-operator
rules:
- apiGroups: ["ohe.io"]
  resources: ["oheclusters", "oheclusters/status"]
  verbs: ["get", "list", "watch", "update", "patch"]
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ruptura-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ruptura-operator
subjects:
- kind: ServiceAccount
  name: ruptura-operator
  namespace: ruptura-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ruptura-operator
  namespace: ruptura-system
  labels:
    app: ruptura-operator
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: operator
    app.kubernetes.io/version: "4.0.0"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ruptura-operator
  template:
    metadata:
      labels:
        app: ruptura-operator
        app.kubernetes.io/name: ruptura
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: ohe-operator
      containers:
      - name: ruptura-operator
        image: ghcr.io/benfradjselim/ohe-operator:4.0.0
        imagePullPolicy: IfNotPresent
        args: ["--interval=30s"]
        resources:
          requests:
            cpu: "50m"
            memory: "32Mi"
          limits:
            cpu: "200m"
            memory: "128Mi"
