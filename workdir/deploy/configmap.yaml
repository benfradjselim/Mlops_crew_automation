apiVersion: v1
kind: ConfigMap
metadata:
  name: ruptura-config
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: config
data:
  # Runtime configuration for the Ruptura server.
  # Most settings are passed as CLI flags or env vars — this ConfigMap
  # is used for documentation and optional overrides.
  RUPTURA_INGEST_RPS: "1000"
  # KAFKA_BROKERS: ""     # set to enable Kafka event streaming
