---
# PersistentVolumeClaim for the Ruptura server (BadgerDB time-series data).
# Apply this BEFORE central-deployment.yaml.
# Kept separate so re-deploying the Deployment never accidentally deletes data.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ruptura-data
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
  annotations:
    helm.sh/resource-policy: keep
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
  # storageClassName: standard   # uncomment and set for your cluster
