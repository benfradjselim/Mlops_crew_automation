---
# ruptura-secrets — generate a strong random api-key before applying:
#   kubectl create secret generic ruptura-secrets -n ruptura-system \
#     --from-literal=api-key=$(openssl rand -hex 32)
#
# Or apply this template directly for dev/lab environments (insecure):
apiVersion: v1
kind: Secret
metadata:
  name: ruptura-secrets
  namespace: ruptura-system
  labels:
    app.kubernetes.io/name: ruptura
    app.kubernetes.io/component: server
type: Opaque
stringData:
  api-key: "REPLACE_ME_WITH_openssl_rand_hex_32"
