# values.yaml

"""
Fichier de valeurs pour la configuration de l'application.

Ce fichier définit les valeurs par défaut pour l'application, notamment le nombre de répliques, l'image Docker et les ressources.
"""

# Configuration du logger
logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')

def load_values() -> dict:
    """
    Charge les valeurs de configuration à partir du fichier values.yaml.

    Returns:
        dict: Les valeurs de configuration chargées.

    Raises:
        FileNotFoundError: Si le fichier values.yaml n'existe pas.
        yaml.YAMLError: Si le fichier n'est pas au format YAML.
    """
    try:
        with open('values.yaml', 'r') as f:
            return yaml.safe_load(f)
    except FileNotFoundError as e:
        logging.error("Le fichier values.yaml n'existe pas.")
        raise e
    except yaml.YAMLError as e:
        logging.error(f"Erreur de format YAML : {e}")
        raise e

def get_default_values() -> dict:
    """
    Retourne les valeurs par défaut.

    Returns:
        dict: Les valeurs par défaut.
    """
    return {
        "replicaCount": 1,
        "image": {
            "repository": "mon-image-docker",
            "tag": "v1.0.0",
            "pullPolicy": "IfNotPresent"
        },
        "resources": {
            "requests": {
                "cpu": "100m",
                "memory": "128Mi"
            },
            "limits": {
                "cpu": "200m",
                "memory": "256Mi"
            }
        }
    }

def validate_values(values: dict) -> None:
    """
    Valide les valeurs de configuration.

    Args:
        values (dict): Les valeurs de configuration à valider.

    Raises:
        ValueError: Si le champ 'replicaCount' est obligatoire.
    """
    if not values:
        raise ValueError("Les valeurs de configuration sont obligatoires.")
    if "replicaCount" not in values:
        raise ValueError("Le champ 'replicaCount' est obligatoire.")
    if "image" not in values or "repository" not in values["image"]:
        raise ValueError("L'image Docker est obligatoire.")
    if "resources" not in values:
        raise ValueError("Les ressources sont obligatoires.")
    if "requests" not in values["resources"]:
        raise ValueError("Les demandes de ressources sont obligatoires.")
    if "limits" not in values["resources"]:
        raise ValueError("Les limites de ressources sont obligatoires.")