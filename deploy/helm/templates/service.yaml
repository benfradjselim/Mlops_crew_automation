import logging

# Set up logging
logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

def create_service(service_name: str, selector_app: str, port: int, target_port: int, service_type: str) -> dict:
    """
    Creates a Kubernetes Service object.

    Args:
    - service_name (str): The name of the service.
    - selector_app (str): The application selector for the service.
    - port (int): The port number for the service.
    - target_port (int): The target port number for the service.
    - service_type (str): The type of the service (e.g., ClusterIP, NodePort).

    Returns:
    - dict: A dictionary representing the Kubernetes Service object.

    Raises:
    - ValueError: If any of the input parameters are invalid.
    - TypeError: If any of the input parameters are of the wrong type.
    """

    try:
        # Validate input parameters
        if not isinstance(service_name, str) or not service_name:
            raise ValueError("Service name must be a non-empty string")
        if not isinstance(selector_app, str) or not selector_app:
            raise ValueError("Selector app must be a non-empty string")
        if not isinstance(port, int) or port <= 0:
            raise ValueError("Port must be a positive integer")
        if not isinstance(target_port, int) or target_port <= 0:
            raise ValueError("Target port must be a positive integer")
        if not isinstance(service_type, str) or not service_type:
            raise ValueError("Service type must be a non-empty string")

        # Create the Service object
        service = {
            "apiVersion": "v1",
            "kind": "Service",
            "metadata": {
                "name": service_name
            },
            "spec": {
                "selector": {
                    "app": selector_app
                },
                "ports": [
                    {
                        "name": "http",
                        "port": port,
                        "targetPort": target_port,
                        "protocol": "TCP"
                    }
                ],
                "type": service_type
            }
        }

        # Log the created Service object
        logger.info("Created Service object: %s", service)

        return service

    except ValueError as e:
        logger.error("Invalid input parameter: %s", e)
        raise
    except TypeError as e:
        logger.error("Invalid input type: %s", e)
        raise
    except Exception as e:
        logger.error("An error occurred: %s", e)
        raise