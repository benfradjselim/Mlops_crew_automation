import logging
import yaml

# Set up logging
logging.basicConfig(level=logging.INFO)
logger = logging.getLogger(__name__)

def load_yaml_config(file_path: str) -> dict:
    """
    Load YAML configuration from file.

    Args:
        file_path (str): Path to YAML file.

    Returns:
        dict: YAML configuration as dictionary.

    Raises:
        yaml.YAMLError: If YAML configuration is invalid.
        FileNotFoundError: If file is not found.
    """
    try:
        with open(file_path, 'r') as file:
            config = yaml.safe_load(file)
        return config
    except yaml.YAMLError as e:
        logger.error(f"Error loading YAML configuration: {e}")
        raise
    except FileNotFoundError as e:
        logger.error(f"File not found: {file_path}")
        raise

def validate_config(config: dict) -> None:
    """
    Validate configuration.

    Args:
        config (dict): Configuration to validate.

    Raises:
        KeyError: If required key is missing.
    """
    required_keys = ['appName', 'replicaCount', 'image', 'service', 'resources', 'persistence']
    for key in required_keys:
        if key not in config:
            logger.error(f"Missing required key: {key}")
            raise KeyError(f"Missing required key: {key}")

def create_deployment(config: dict) -> str:
    """
    Create Kubernetes deployment YAML.

    Args:
        config (dict): Configuration for deployment.

    Returns:
        str: Deployment YAML as string.

    Raises:
        ValueError: If configuration is invalid.
    """
    try:
        # Validate configuration
        validate_config(config)

        # Create deployment YAML
        deployment_yaml = """
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.appName }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.appName }}
  template:
    metadata:
      labels:
        app: {{ .Values.appName }}
    spec:
      containers:
      - name: {{ .Values.appName }}
        image: {{ .Values.image }}
        resources:
          requests:
            cpu: {{ .Values.resources.cpu }}
            memory: {{ .Values.resources.memory }}
        ports:
        - containerPort: {{ .Values.service.port }}
"""
        return deployment_yaml
    except Exception as e:
        logger.error(f"Error creating deployment YAML: {e}")
        raise

def main():
    config_file = "config.yaml"
    config = load_yaml_config(config_file)
    deployment_yaml = create_deployment(config)
    print(deployment_yaml)

if __name__ == "__main__":
    main()